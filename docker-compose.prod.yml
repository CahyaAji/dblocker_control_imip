services:
  app:
    container_name: dblocker-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - postgres
      - mosquitto
    environment:
      APP_PORT: ${APP_PORT:-8080}
      MQTT_BROKER: ${MQTT_BROKER:-tcp://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-DBL0KER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_TIMEZONE: ${DB_TIMEZONE:-UTC}
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET}
      API_KEY: ${API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8080:8080"

  assist:
    container_name: dblocker-assist-app
    build:
      context: .
      dockerfile: Dockerfile.assist
    restart: always
    depends_on:
      - app
      - mosquitto
    environment:
      API_KEY: ${API_KEY}
      BACKEND_URL: http://dblocker-app:8080
      DRONE_DETECTORS: ${DRONE_DETECTORS:-}
      MQTT_BROKER: ${MQTT_BROKER:-tcp://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}

  mosquitto:
    container_name: dblocker-mqtt
    image: eclipse-mosquitto:2
    restart: always
    ports:
      - "${MQTT_PUBLIC_PORT:-1883}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  postgres:
    container_name: dblocker-postgres
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports: []
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
